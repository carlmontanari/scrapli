---
prompt_pattern: '^.*[>#$]\s?+$'
default_mode: 'privileged_exec'
modes:
  - name: 'exec'
    prompt_pattern: '^\([a-z0-9.\-_]{1,63}\)\s>$'
    accessible_modes:
      - name: 'privileged_exec'
        instructions:
          - send_prompted_input:
              input: 'enable'
              prompt_exact: '^(?:[eE]nable\s){0,1}[pP]assword:\s?$'
              response: '__lookup::enable'
  - name: 'privileged_exec'
    prompt_pattern: '^\([a-z0-9.\-_]{1,63}\)\s#$'
    accessible_modes:
      - name: 'exec'
        instructions:
          - send_input:
              input: 'exit'
      - name: 'configuration'
        instructions:
          - send_input:
              input: 'configure'
  - name: 'configuration'
    prompt_pattern: '^\([a-z0-9.\-_]{1,63}\)\s\([\w.\-@/:+ ]{1,32}\)#$'
    accessible_modes:
      - name: 'privileged_exec'
        instructions:
          - send_input:
              input: 'end'
failure_indicators:
  - 'Ambiguous command'
  - 'Command not found / Incomplete command. Use ? to list commands.'
  - 'Invalid input.'
  - 'Unrecognized command'
  - '% Invalid input detected at ''^'' marker.'
on_open_instructions:
  - enter_mode:
      requested_mode: 'privileged_exec'
  - send_input:
      input: 'terminal length 0'
on_close_instructions:
  - enter_mode:
      requested_mode: 'privileged_exec'
  - write:
      input: 'exit'